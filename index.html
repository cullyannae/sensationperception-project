<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Vision Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }

    select {
      margin-top: 15px;
      padding: 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Color Vision Simulator</h1>
  <p>Explore how different types of color vision deficiency affect perception.</p>

  <input type="file" id="upload" accept="image/*"><br>

  <select id="filterSelect">
    <option value="normal">Normal Vision</option>
    <option value="protanopia">Protanopia</option>
    <option value="deuteranopia">Deuteranopia</option>
    <option value="tritanopia">Tritanopia</option>
    <option value="mono">Monochromatism</option>
  </select>

  <img id="image" src="" alt="Upload an image">
</div>

<!-- SVG Filters -->
<svg width="0" height="0">
  <filter id="protanopia">
    <feColorMatrix type="matrix" values="
      0.567 0.433 0     0 0
      0.558 0.442 0     0 0
      0     0.242 0.758 0 0
      0     0     0     1 0"/>
  </filter>

  <filter id="deuteranopia">
    <feColorMatrix type="matrix" values="
      0.625 0.375 0     0 0
      0.7   0.3   0     0 0
      0     0.3   0.7   0 0
      0     0     0     1 0"/>
  </filter>

  <filter id="tritanopia">
    <feColorMatrix type="matrix" values="
      0.95 0.05  0     0 0
      0     0.433 0.567 0 0
      0     0.475 0.525 0 0
      0     0     0     1 0"/>
  </filter>

  <filter id="mono">
    <feColorMatrix type="matrix" values="
      0.33 0.33 0.33 0 0
      0.33 0.33 0.33 0 0
      0.33 0.33 0.33 0 0
      0    0    0    1 0"/>
  </filter>
</svg>

<script>
  const upload = document.getElementById("upload");
  const image = document.getElementById("image");
  const filterSelect = document.getElementById("filterSelect");

  upload.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      image.src = URL.createObjectURL(file);
    }
  });

  filterSelect.addEventListener("change", applyFilter);

  function applyFilter() {
    const value = filterSelect.value;

    if (value === "normal") {
      image.style.filter = "none";
    } else {
      image.style.filter = `url(#${value})`;
    }
  }
</script>

</body>
</html>
