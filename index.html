<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Perception Filter Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }

    .controls {
      margin-top: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Color Filter Perception Tool</h1>
  <p>Upload an image and explore how color filters change perception.</p>

  <input type="file" id="upload" accept="image/*">

  <img id="image" src="" alt="Your image will appear here">

  <div class="controls">
    <label>Grayscale: <span id="gVal">0</span>%</label>
    <input type="range" id="grayscale" min="0" max="100" value="0">

    <label>Sepia: <span id="sVal">0</span>%</label>
    <input type="range" id="sepia" min="0" max="100" value="0">

    <label>Invert: <span id="iVal">0</span>%</label>
    <input type="range" id="invert" min="0" max="100" value="0">

    <label>Brightness: <span id="bVal">100</span>%</label>
    <input type="range" id="brightness" min="0" max="200" value="100">

    <label>Hue Rotate: <span id="hVal">0</span>°</label>
    <input type="range" id="hue" min="0" max="360" value="0">
  </div>
</div>

<script>
  const img = document.getElementById("image");
  const upload = document.getElementById("upload");

  const grayscale = document.getElementById("grayscale");
  const sepia = document.getElementById("sepia");
  const invert = document.getElementById("invert");
  const brightness = document.getElementById("brightness");
  const hue = document.getElementById("hue");

  const gVal = document.getElementById("gVal");
  const sVal = document.getElementById("sVal");
  const iVal = document.getElementById("iVal");
  const bVal = document.getElementById("bVal");
  const hVal = document.getElementById("hVal");

  upload.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
      img.src = URL.createObjectURL(file);
    }
  });

  function updateFilters() {
    const filter = `
      grayscale(${grayscale.value}%)
      sepia(${sepia.value}%)
      invert(${invert.value}%)
      brightness(${brightness.value}%)
      hue-rotate(${hue.value}deg)
    `;
    img.style.filter = filter;

    gVal.textContent = grayscale.value;
    sVal.textContent = sepia.value;
    iVal.textContent = invert.value;
    bVal.textContent = brightness.value;
    hVal.textContent = hue.value;
  }

  document.querySelectorAll("input[type=range]").forEach(slider => {
    slider.addEventListener("input", updateFilters);
  });
</script>

</body>
</html>
