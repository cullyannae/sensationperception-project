<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Vision Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }

    select, input[type="range"] {
      margin-top: 15px;
      padding: 8px;
      font-size: 16px;
      width: 80%;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Color Vision Simulator</h1>
  <p>Adjust intensity to explore different levels of color vision deficiency.</p>

  <input type="file" id="upload" accept="image/*"><br>

  <select id="filterSelect">
    <option value="normal">Normal Vision</option>
    <option value="protanopia">Protanopia</option>
    <option value="deuteranopia">Deuteranopia</option>
    <option value="tritanopia">Tritanopia</option>
    <option value="mono">Monochromatism</option>
  </select>

  <label>Intensity: <span id="intensityVal">100</span>%</label>
  <input type="range" id="intensity" min="0" max="100" value="100">

  <img id="image" src="" alt="Upload an image">
</div>

<script>
  const upload = document.getElementById("upload");
  const image = document.getElementById("image");
  const filterSelect = document.getElementById("filterSelect");
  const intensitySlider = document.getElementById("intensity");
  const intensityVal = document.getElementById("intensityVal");

  upload.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      image.src = URL.createObjectURL(file);
    }
  });

  filterSelect.addEventListener("change", applyFilter);
  intensitySlider.addEventListener("input", applyFilter);

  function applyFilter() {
    const type = filterSelect.value;
    const t = intensitySlider.value / 100;
    intensityVal.textContent = intensitySlider.value;

    let matrix;

    if (type === "normal") {
      image.style.filter = "none";
      return;
    }

    if (type === "protanopia") {
      matrix = [
        1 - 0.433*t, 0.433*t, 0, 0, 0,
        0.558*t, 1 - 0.558*t, 0, 0, 0,
        0, 0.242*t, 1 - 0.242*t, 0, 0,
        0, 0, 0, 1, 0
      ];
    }

    if (type === "deuteranopia") {
      matrix = [
        1 - 0.375*t, 0.375*t, 0, 0, 0,
        0.7*t, 1 - 0.7*t, 0, 0, 0,
        0, 0.3*t, 1 - 0.3*t, 0, 0,
        0, 0, 0, 1, 0
      ];
    }

    if (type === "tritanopia") {
      matrix = [
        1 - 0.05*t, 0.05*t, 0, 0, 0,
        0, 1 - 0.567*t, 0.567*t, 0, 0,
        0, 0.475*t, 1 - 0.475*t, 0, 0,
        0, 0, 0, 1, 0
      ];
    }

    if (type === "mono") {
      matrix = [
        1 - 0.67*t, 0.33*t, 0.33*t, 0, 0,
        0.33*t, 1 - 0.67*t, 0.33*t, 0, 0,
        0.33*t, 0.33*t, 1 - 0.67*t, 0, 0,
        0, 0, 0, 1, 0
      ];
    }

    const matrixString = matrix.join(" ");
    image.style.filter = `url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg">\
<filter id="f">\
<feColorMatrix type="matrix" values="${matrixString}"/>\
</filter>\
</svg>#f')`;
  }
</script>

</body>
</html>
