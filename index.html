<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Vision Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 20px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      display: block;
    }

    .filtered {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    select, input[type="range"] {
      margin-top: 15px;
      padding: 8px;
      font-size: 16px;
      width: 80%;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Color Vision Simulator</h1>
  <p>Adjust intensity to explore different levels of color vision deficiency.</p>

  <input type="file" id="upload" accept="image/*"><br>

  <select id="filterSelect">
    <option value="normal">Normal Vision</option>
    <option value="protanopia">Protanopia</option>
    <option value="deuteranopia">Deuteranopia</option>
    <option value="tritanopia">Tritanopia</option>
    <option value="mono">Monochromatism</option>
  </select>

  <label>Intensity: <span id="intensityVal">0</span>%</label>
  <input type="range" id="intensity" min="0" max="100" value="0">

  <div class="image-wrapper">
    <!-- Original -->
    <img id="original" src="">
    <!-- Filtered overlay -->
    <img id="filtered" class="filtered" src="">
  </div>
</div>

<!-- SVG Filters (UNCHANGED) -->
<svg width="0" height="0">
  <filter id="protanopia">
    <feColorMatrix type="matrix" values="
      0.567 0.433 0     0 0
      0.558 0.442 0     0 0
      0     0.242 0.758 0 0
      0     0     0     1 0"/>
  </filter>

  <filter id="deuteranopia">
    <feColorMatrix type="matrix" values="
      0.625 0.375 0     0 0
      0.7   0.3   0     0 0
      0     0.3   0.7   0 0
      0     0     0     1 0"/>
  </filter>

  <filter id="tritanopia">
    <feColorMatrix type="matrix" values="
      0.95 0.05  0     0 0
      0     0.433 0.567 0 0
      0     0.475 0.525 0 0
      0     0     0     1 0"/>
  </filter>

  <filter id="mono">
    <feColorMatrix type="matrix" values="
      0.33 0.33 0.33 0 0
      0.33 0.33 0.33 0 0
      0.33 0.33 0.33 0 0
      0    0    0    1 0"/>
  </filter>
</svg>

<script>
  const upload = document.getElementById("upload");
  const original = document.getElementById("original");
  const filtered = document.getElementById("filtered");
  const filterSelect = document.getElementById("filterSelect");
  const intensity = document.getElementById("intensity");
  const intensityVal = document.getElementById("intensityVal");

  upload.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      const url = URL.createObjectURL(file);
      original.src = url;
      filtered.src = url;
    }
  });

  filterSelect.addEventListener("change", update);
  intensity.addEventListener("input", update);

  function update() {
    const type = filterSelect.value;
    const value = intensity.value;

    intensityVal.textContent = value;

    if (type === "normal") {
      filtered.style.filter = "none";
      filtered.style.opacity = 0;
    } else {
      filtered.style.filter = `url(#${type})`;
      filtered.style.opacity = value / 100;
    }
  }
</script>

</body>
</html>
