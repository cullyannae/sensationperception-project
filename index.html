<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Vision Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 20px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      pointer-events: none;
      opacity: 0;
    }

    select, input[type="range"] {
      margin-top: 15px;
      padding: 8px;
      font-size: 16px;
      width: 80%;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Color Vision Simulator</h1>
  <p>Adjust intensity to simulate different color vision types.</p>

  <input type="file" id="upload" accept="image/*"><br>

  <select id="filterSelect">
    <option value="normal">Normal Vision</option>
    <option value="protanopia">Protanopia</option>
    <option value="deuteranopia">Deuteranopia</option>
    <option value="tritanopia">Tritanopia</option>
    <option value="mono">Monochromatism</option>
  </select>

  <label>Intensity: <span id="intensityVal">0</span>%</label>
  <input type="range" id="intensity" min="0" max="100" value="0">

  <div class="image-wrapper">
    <img id="image" src="">
    <div id="overlay" class="overlay"></div>
  </div>
</div>

<script>
  const upload = document.getElementById("upload");
  const image = document.getElementById("image");
  const overlay = document.getElementById("overlay");
  const filterSelect = document.getElementById("filterSelect");
  const intensity = document.getElementById("intensity");
  const intensityVal = document.getElementById("intensityVal");

  upload.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      image.src = URL.createObjectURL(file);
    }
  });

  filterSelect.addEventListener("change", updateFilter);
  intensity.addEventListener("input", updateFilter);

  function updateFilter() {
    const type = filterSelect.value;
    const value = intensity.value;
    intensityVal.textContent = value;

    overlay.style.opacity = value / 100;

    if (type === "normal") {
      overlay.style.background = "transparent";
      image.style.filter = "none";
    }

    if (type === "protanopia") {
      overlay.style.background = "rgba(0,255,0,0.5)";
      image.style.filter = "contrast(0.8) saturate(0.6)";
    }

    if (type === "deuteranopia") {
      overlay.style.background = "rgba(255,0,0,0.4)";
      image.style.filter = "contrast(0.85) saturate(0.7)";
    }

    if (type === "tritanopia") {
      overlay.style.background = "rgba(255,100,100,0.4)";
      image.style.filter = "contrast(0.9) saturate(0.6)";
    }

    if (type === "mono") {
      overlay.style.background = "transparent";
      image.style.filter = `grayscale(${value}%)`;
    }
  }
</script>

</body>
</html>
